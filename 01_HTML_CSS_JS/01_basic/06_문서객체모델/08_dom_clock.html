<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Script스니펫</title>
    <script>
      window.onload = function () {
        const clock = document.getElementById('clock');

        // let now = new Date();
        // console.log(now);

        // this
        // 객체에서 this -> 그 객체
        // 이벤트 핸들러 -> 이벤트가 발생한 요소
        // setInterval과 같은 일반 함수 -> window

        setInterval(function () {
          let now = new Date();
          clock.innerHTML = now.toString();
          //   console.log(`${this}`);
        }, 1000);
      };
    </script>
  </head>

  <body>
    <h1 id="clock"></h1>
    <div></div>
  </body>
</html>
